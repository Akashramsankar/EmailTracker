<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Tracker Native Reply</title>
  <script src="{{{appClient}}}{{{appclient}}}"></script>
  <style>
    :root {
      --ink: #17324d;
      --ink-soft: #526c86;
      --line: #d8e3ee;
      --accent: #1f6fd1;
      --accent-soft: #eaf3ff;
      --success: #027a48;
      --surface: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
      color: var(--ink);
    }

    .shell {
      display: grid;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(244, 248, 252, 0.98));
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 11px;
      font-weight: 700;
    }

    .copy,
    .status {
      font-size: 12px;
      line-height: 1.5;
      color: var(--ink-soft);
    }

    .status.success {
      color: var(--success);
    }

    .btn {
      appearance: none;
      width: max-content;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: default;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    .field label {
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    select,
    textarea,
    input {
      width: 100%;
      border: 1px solid #cbd7e5;
      border-radius: 8px;
      padding: 8px 10px;
      font: inherit;
      font-size: 12px;
      color: var(--ink);
      background: #fff;
    }

    textarea {
      min-height: 76px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="file"] {
      padding: 7px 8px;
      font-size: 12px;
    }

    .attachment-list {
      display: grid;
      gap: 4px;
      color: var(--ink-soft);
      font-size: 12px;
      line-height: 1.4;
    }

    .attachment-list:empty {
      display: none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topline">
      <div class="title">Email Tracker</div>
      <div class="pill" id="editorModePill">Tracking Ready</div>
    </div>

    <div class="copy">
      Use this Email Tracker send box for tracked replies. Freshdesk's native Send still works normally, but is not tracked.
    </div>

    <div class="field">
      <label for="editorSenderSelect">From</label>
      <select id="editorSenderSelect">
        <option value="">Default mailbox</option>
      </select>
    </div>

    <div class="field">
      <label for="editorReplyBody">Reply</label>
      <textarea id="editorReplyBody" placeholder="Write a tracked reply..."></textarea>
    </div>

    <div class="field">
      <label for="editorAttachments">Attachments</label>
      <input id="editorAttachments" type="file" multiple>
      <div class="attachment-list" id="editorAttachmentList"></div>
    </div>

    <button class="btn" id="editorSendTrackedReplyBtn" type="button">Send Tracked Reply</button>
    <button class="btn" id="refreshEditorBtn" type="button">Refresh Tracking</button>
    <div class="status" id="editorStatus">Loading native reply tracking.</div>
  </div>

  <script src="./scripts/editor.js"></script>
</body>
</html>
