<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Tracker Sidebar</title>
  <script src="{{{appClient}}}{{{appclient}}}"></script>
  <link rel="stylesheet" href="https://static.freshdev.io/fdk/2.0/assets/freshworks.css">
  <style>
    :root {
      --ink: #17324d;
      --ink-soft: #667b95;
      --surface: #ffffff;
      --surface-muted: #f5f7fb;
      --border: #d9e3ef;
      --primary: #17324d;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fb;
      color: var(--ink);
    }

    .loading {
      padding: 36px 16px;
      text-align: center;
      color: var(--ink-soft);
      font-size: 14px;
    }

    .page {
      padding: 14px 12px 18px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 22px rgba(23, 50, 77, 0.06);
      padding: 14px;
    }

    .metrics {
      display: grid;
      gap: 8px;
    }

    .metric {
      border: 1px solid #e3ebf4;
      border-radius: 10px;
      padding: 10px 12px;
      background: linear-gradient(180deg, #ffffff 0, #f8fbff 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .metric-label {
      color: var(--ink-soft);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .actions {
      margin-top: 12px;
    }

    .btn {
      appearance: none;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #cad5e3;
      background: #fff;
      color: var(--ink);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="loading" id="sidebarLoading">Loading ticket email tracker...</div>

  <div class="page hidden" id="sidebarMain">
    <div class="panel">
      <div class="metrics" id="metricsGrid"></div>
      <div class="actions">
        <button class="btn" id="refreshBtn" type="button">Refresh</button>
      </div>
    </div>
  </div>

  <script src="./scripts/sidebar.js"></script>
</body>
</html>
